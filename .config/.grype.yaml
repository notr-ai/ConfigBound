exclude:
  - "**/node_modules/**"

ignore:
  # No upstream fix available: esbuild dev server CORS bypass via vitepress -> vite -> esbuild
  # https://github.com/advisories/GHSA-67mh-4wv8-2f99
  - vulnerability: GHSA-67mh-4wv8-2f99

  # No fix available in markdownlint-cli2@0.22.0 (latest): smol-toml DoS in dev tooling only
  # https://github.com/advisories/GHSA-v3rj-xjv7-4jmq
  - vulnerability: GHSA-v3rj-xjv7-4jmq

  # Go stdlib vulnerabilities from the system-installed Go binary on the CI runner (ubuntu-latest
  # ships with Go pre-installed). This project contains no Go source or binaries — these findings
  # are not part of the project's dependency surface and are not actionable here.
  - package:
      name: stdlib
      type: go-module

  # brace-expansion vulnerability in typedoc -> minimatch -> brace-expansion (dev-only, not
  # shipped in any published package). No fix available via typedoc upgrade at time of writing.
  # https://github.com/advisories/GHSA-jxxr-4gwj-5jf2
  - vulnerability: GHSA-jxxr-4gwj-5jf2
    package:
      name: brace-expansion
      type: npm

  # turbo CSRF login callback vulnerability — fixed in turbo >=2.9.14. We are on 2.9.14.
  # Grype's DB was published before the patched-version metadata propagated.
  # https://github.com/advisories/GHSA-hcf7-66rw-9f5r
  - vulnerability: GHSA-hcf7-66rw-9f5r
    package:
      name: turbo
      type: npm

  # turbo Yarn Berry local code execution — fixed in turbo >=2.9.14. We are on 2.9.14.
  # Grype's DB was published before the patched-version metadata propagated.
  # https://github.com/advisories/GHSA-3qcw-2rhx-2726
  - vulnerability: GHSA-3qcw-2rhx-2726
    package:
      name: turbo
      type: npm

  # vite path traversal in optimized deps .map handling — fixed in vite >=6.4.2.
  # We use vite 5.4.21 transitively via VitePress (docs only). Exploitable only when the
  # dev server is explicitly started with --host; the docs dev server is never exposed in CI
  # or production. Fix requires a major vite + VitePress upgrade.
  # https://github.com/advisories/GHSA-4w7w-66w2-5vf9
  - vulnerability: GHSA-4w7w-66w2-5vf9
    package:
      name: vite
      type: npm
