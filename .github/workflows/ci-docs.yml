name: ci-docs
on:
  pull_request:
    branches:
      - main

env:
  HUSKY: 0
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  docs-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Cache turbo build setup
        uses: actions/cache@v5
        with:
          path: ./.turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ hashFiles('**/pnpm-lock.yaml') }}-
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: DavidAnson/markdownlint-cli2-action@v23.0.0
        with:
          globs: '**/*.md'
          config: '.config/.markdownlint-cli2.jsonc'

      - name: Build docs
        run: pnpm turbo run docs:build --filter=@config-bound/docs

      - name: Upload docs artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: docs
          path: apps/docs
          include-hidden-files: true
          retention-days: 1

  vale-check:
    runs-on: ubuntu-latest
    needs: docs-build
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          sparse-checkout: .config
      - name: Download docs artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: docs
          path: apps/docs
      - name: Cache Vale styles
        id: cache-vale-styles
        uses: actions/cache@v5
        with:
          path: .config/styles
          key: vale-styles-3.14.1-${{ hashFiles('.config/.vale.ini') }}
      - name: Sync Vale styles
        if: steps.cache-vale-styles.outputs.cache-hit != 'true'
        env:
          VALE_VERSION: 3.14.1
          VALE_CHECKSUM: ff2b49ffaa9dcd246fd5008f03ff67746d2790b75bf4d3657e2fb9530fb96db3
        run: |
          wget --quiet --output-document vale.tar.gz \
            https://github.com/vale-cli/vale/releases/download/v${VALE_VERSION}/vale_${VALE_VERSION}_Linux_64-bit.tar.gz
          echo "${VALE_CHECKSUM}  vale.tar.gz" | sha256sum --check
          tar --extract --gzip --file vale.tar.gz vale
          ./vale sync --config=./.config/.vale.ini
          rm vale vale.tar.gz
      - name: Check prose style (Vale) with PR annotations
        uses: vale-cli/vale-action@v2
        with:
          files: '["apps/docs", "apps/docs/.vitepress/dist"]'
          reporter: github-pr-review
          fail_on_error: true
          vale_flags: --config=./.config/.vale.ini --glob=!**/reference/**
          version: 3.14.1

  link-check:
    runs-on: ubuntu-latest
    needs: docs-build
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          sparse-checkout: .config/lychee.toml
      - name: Download docs artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: docs
          path: apps/docs
      - name: Check links
        uses: lycheeverse/lychee-action@v2.8.0
        with:
          args: --config .config/lychee.toml --root-dir ${{ github.workspace }}/apps/docs ./apps/docs/**/*.md
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
