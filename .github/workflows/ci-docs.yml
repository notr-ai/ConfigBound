name: ci-docs
on:
  pull_request:
    branches:
      - main

env:
  HUSKY: 0
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  docs-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Cache turbo build setup
        uses: actions/cache@v5
        with:
          path: ./.turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles('**/package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ hashFiles('**/package-lock.json') }}-
            ${{ runner.os }}-turbo-
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: './package-lock.json'
      - name: Install npm packages
        run: npm ci --no-fund
      - uses: DavidAnson/markdownlint-cli2-action@v23.0.0
        with:
          globs: '**/*.md'
          config: '.config/.markdownlint-cli2.jsonc'
      - name: Build docs
        run: npx turbo run docs:build --filter=@config-bound/docs
      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs
          path: apps/docs
          retention-days: 1

  vale-check:
    runs-on: ubuntu-latest
    needs: docs-build
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          sparse-checkout: .config
      - name: Download docs artifact
        uses: actions/download-artifact@v4
        with:
          name: docs
          path: apps/docs
      - name: Cache Vale
        id: cache-vale
        uses: actions/cache@v5
        with:
          path: |
            /usr/local/bin/vale
            .config/styles
          key: vale-3.14.1-${{ hashFiles('.config/.vale.ini') }}
      - name: Install Vale and sync styles
        if: steps.cache-vale.outputs.cache-hit != 'true'
        env:
          VALE_VERSION: 3.14.1
          VALE_CHECKSUM: ff2b49ffaa9dcd246fd5008f03ff67746d2790b75bf4d3657e2fb9530fb96db3
        run: |
          wget --quiet --output-document vale.tar.gz \
            https://github.com/vale-cli/vale/releases/download/v${VALE_VERSION}/vale_${VALE_VERSION}_Linux_64-bit.tar.gz
          echo "${VALE_CHECKSUM}  vale.tar.gz" | sha256sum --check
          tar --extract --gzip --file vale.tar.gz vale
          sudo mv vale /usr/local/bin/vale
          rm vale.tar.gz
          vale sync --config=./.config/.vale.ini
      - name: Check prose style (Vale) with PR annotations
        uses: vale-cli/vale-action@v2
        with:
          files: '["apps/docs", "apps/docs/.vitepress/dist"]'
          reporter: github-pr-review
          fail_on_error: true
          vale_flags: --config=./.config/.vale.ini
          version: none

  link-check:
    runs-on: ubuntu-latest
    needs: docs-build
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          sparse-checkout: |
            apps/docs
            .config/lychee.toml
      - name: Check links
        uses: lycheeverse/lychee-action@v2.8.0
        with:
          args: --config .config/lychee.toml --root-dir ${{ github.workspace }}/apps/docs ./apps/docs/**/*.md
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
