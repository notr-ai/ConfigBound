name: cd
on:
  push:
    branches:
      - main

env:
  HUSKY: 0
  TURBO_TELEMETRY_DISABLED: 1

permissions:
  contents: write
  id-token: write
  pages: write
  packages: write
  pull-requests: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Cache turbo build setup
        uses: actions/cache@v5
        with:
          path: ./.turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles('**/package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ hashFiles('**/package-lock.json') }}-
            ${{ runner.os }}-turbo-

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: "./package-lock.json"

      - name: Install npm packages
        run: npm ci --no-fund

      - name: Check Formatting
        run: npm run format:ci

      - name: Lint
        run: npm run lint:ci

      - name: Build
        run: npm run build

      - name: Run Tests
        run: npm run test

      - name: Security Scan
        uses: anchore/scan-action@v7
        with:
          path: "."
          fail-build: true
          severity-cutoff: high
          cache-db: true
          config: .config/.grype.yaml

  release:
    needs: verify
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.changesets.outputs.published }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # needed for changesets

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: "./package-lock.json"
          registry-url: "https://registry.npmjs.org"

      - name: Install npm packages
        run: npm ci --no-fund

      - name: Get package version
        id: package_version
        run: echo "version=$(jq -r '.version' ./packages/config-bound/package.json)" >> $GITHUB_OUTPUT

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          publish: npm run release
          version: npm run version-packages
          commit: "chore: version packages"
          title: "Release - v${{ steps.package_version.outputs.version }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Label Release PR
        if: steps.changesets.outputs.pullRequestNumber
        continue-on-error: true
        run: |
          gh pr edit ${{ steps.changesets.outputs.pullRequestNumber }} --add-label "release"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-docs:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache turbo build setup
        uses: actions/cache@v5
        with:
          path: ./.turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles('**/package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ hashFiles('**/package-lock.json') }}-
            ${{ runner.os }}-turbo-

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: "./package-lock.json"

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Install dependencies
        run: npm ci --no-fund

      - name: Build docs
        run: npm run docs:build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: apps/docs/.vitepress/dist

  deploy-docs:
    needs:
      - release
      - build-docs
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
