name: ci
on:
  pull_request:
    branches:
      - main
env:
  HUSKY: 0
  TURBO_TELEMETRY_DISABLED: 1
jobs:
  application-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Cache turbo build setup
        uses: actions/cache@v4
        with:
          path: ./.turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles('**/package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ hashFiles('**/package-lock.json') }}-
            ${{ runner.os }}-turbo-
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: './package-lock.json'
      - name: Install npm packages
        id: npm-ci
        run: npm ci --no-fund
      - name: Check Formatting
        id: fmt
        run: npx turbo format:ci
      - name: Lint
        id: lint
        run: npx turbo lint:ci
      - name: Build
        id: build
        run: npx turbo build
      - name: Run Unit Tests
        id: test
        run: npx turbo test
  security-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: './package-lock.json'
      - name: Install npm packages
        run: npm ci --no-fund

      - name: Security Scan
        id: scan
        uses: anchore/scan-action@v7
        with:
          path: '.'
          fail-build: true
          severity-cutoff: medium
          output-format: sarif
          cache-db: true

      - name: Upload SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v3
        if: success() || failure()
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}
  documentation-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: './package-lock.json'
      - name: Install npm packages
        run: npm ci --no-fund
      - uses: DavidAnson/markdownlint-cli2-action@v23.0.0
        with:
          globs: '**/*.md'
          config: '.config/.markdownlint-cli2.jsonc'
      - name: Build docs
        run: npx turbo run docs:build --filter=@config-bound/docs
      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --config .config/lychee.toml --root-dir ${{ github.workspace }}/apps/docs ./apps/docs/**/*.md
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
