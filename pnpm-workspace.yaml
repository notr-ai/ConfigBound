packages:
  - 'packages/*'
  - 'apps/*'
  - 'examples'

allowBuilds:
  '@nestjs/core': true
  esbuild: true
  unrs-resolver: true

catalog:
  # Shared runtime
  zod: "^4.4.1"

  # Build tooling
  tsx: "^4.20.6"
  tsdown: "^0.22.0"
  turbo: "^2.9.16"
  typescript: "^6.0.0"
  rimraf: "^6.1.0"
  husky: "^9.1.7"

  # Testing
  jest: "^30.2.0"
  ts-jest: "^29.4.5"
  jest-runner-groups: "^2.2.0"
  "@types/jest": "^30.0.0"
  "@types/node": "^24.10.0"

  # Linting & formatting
  eslint: "^9.39.1"
  prettier: "3.8.2"
  "@eslint/js": "^9.39.1"
  "@typescript-eslint/eslint-plugin": "^8.46.3"
  "eslint-config-prettier": "^10.1.8"
  "eslint-plugin-jest": "^29.0.1"
  "eslint-plugin-turbo": "^2.6.0"
  globals: "^16.5.0"
  "typescript-eslint": "^8.51.8"
